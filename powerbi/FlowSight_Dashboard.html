  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e8eaf6;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }
    /* ── Top nav ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3e;
      padding: 0 28px;
      height: 52px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #0d6efd;
      letter-spacing: -0.5px;
    }
    .logo span { color: #e8eaf6; font-weight: 400; font-size: 13px; margin-left: 8px; }
    nav { display: flex; gap: 4px; }
    .nav-btn {
      background: none; border: none;
      color: #8892b0;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.06); color: #e8eaf6; }
    .nav-btn.active { background: #0d6efd; color: #fff; font-weight: 600; }
    .refresh-time { font-size: 11px; color: #8892b0; }
    /* ── Content ── */
    main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }
    .page { display: none; }
    .page.active { display: block; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8892b0;
      margin: 16px 0 6px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 4px;
    }
    .row > div {
      background: #1a1d27;
      border-radius: 10px;
      border: 1px solid #2a2d3e;
      padding: 4px;
      overflow: hidden;
    }
    /* ── Alert badge ── */
    .alert-banner {
      background: rgba(220,53,69,0.15);
      border: 1px solid #dc3545;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #dc3545;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-banner b { font-weight: 700; }
  </style>

<script>
  const pages = document.querySelectorAll('.page');
  const nav   = document.getElementById('nav');

  pages.forEach((page, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = page.dataset.label;
    btn.onclick = () => {
      pages.forEach(p => p.classList.remove('active'));
      nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      page.classList.add('active');
      btn.classList.add('active');
    };
    nav.appendChild(btn);
  });

  pages[0].classList.add('active');
</script>
